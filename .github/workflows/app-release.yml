name: App release (reusable)

# Réutilisable pour les apps Lamm packagées via jpackage (DEB Linux + MSI Windows).
# Build matrix linux+windows, vérifie pom == tag, upload des installateurs comme
# assets sur la GitHub Release du tag.
#
# Caller minimal :
#   on:
#     push:
#       tags: ['v*']
#   jobs:
#     release:
#       uses: Jeremy27/LammCI/.github/workflows/app-release.yml@main
#       with:
#         app-name: Lammprimante
#       permissions:
#         contents: write
#         packages: read

on:
  workflow_call:
    inputs:
      app-name:
        description: 'Nom affiché dans le titre de la release'
        type: string
        required: true
      linux-profile:
        description: 'Profil Maven pour le build Linux (DEB)'
        type: string
        default: 'dist-linux'
      windows-profile:
        description: 'Profil Maven pour le build Windows (MSI)'
        type: string
        default: 'dist-win'
      linux-artifact-glob:
        description: 'Glob des artefacts Linux à uploader'
        type: string
        default: 'target/*.deb'
      windows-artifact-glob:
        description: 'Glob des artefacts Windows à uploader'
        type: string
        default: 'target/*.msi'
      java-version:
        description: 'Version JDK Temurin'
        type: string
        default: '25'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            profile: ${{ inputs.linux-profile }}
            artifact-glob: ${{ inputs.linux-artifact-glob }}
            artifact-name: ${{ inputs.app-name }}-linux
          - os: windows-latest
            profile: ${{ inputs.windows-profile }}
            artifact-glob: ${{ inputs.windows-artifact-glob }}
            artifact-name: ${{ inputs.app-name }}-windows
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          server-id: github-lammui
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Install fakeroot (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Install WiX (Windows)
        if: runner.os == 'Windows'
        run: choco install wixtoolset -y --no-progress

      - name: Verify pom version matches tag
        shell: bash
        run: |
          POM_VERSION=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$POM_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version pom ($POM_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build installer
        run: mvn --batch-mode -P${{ matrix.profile }} clean package
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          APP: ${{ inputs.app-name }}
        run: |
          VERSION="${TAG#v}"
          gh release create "$TAG" artifacts/* \
            --repo "$REPO" \
            --title "$APP $VERSION" \
            --generate-notes
